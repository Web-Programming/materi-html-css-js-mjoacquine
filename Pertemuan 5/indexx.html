<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS</title>

<style>
/* ini internal css */
/* selector tag html */

body{
    background-color: rgb(250, 0, 221);
    text-align: center;
    font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
}

h2{
    text-decoration: underline;
}

div{
    border-width: 10px;
    border-style: dotted;
    border-color: #000;
    margin: 10px;
    padding: 10px;
}

/* Selector Class */

.border-warna-merah{
    border-color: #bd0303;
}

.border-warna-biru{
    border-color: rgb(5, 5, 192);
}

.border-warna-hijau{
    border-color: rgb(127, 255, 127);
}

.border-spesial{
    border: 5px solid rgb(141, 92, 0);
}

</style>

</head>

<body>

<h1 style="color: blue; font-size: 15pt;">Mengenal CSS Inline</h1>

<h1 style="color: rgb(255, 179, 0); font-family: Arial;">
Ini text berwarna merah
</h1> 

<h2>Mengenal selector pada CSS</h2>

<div class="border-warna-hijau">
Hello, apakabar mahasiswa kelas i4b
</div>

<div class="border-warna-biru">
Kita bahas selection lainnya
</div>

<div class="border-warna-merah">
Kita bahas selection lainnya
</div>

</body>
</html>
